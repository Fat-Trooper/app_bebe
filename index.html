const CONCEPTION_DATE = new Date(2025, 11, 29);

function getWeeksPregnancy() {
  const now = new Date();
  const diff = now - CONCEPTION_DATE;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const saWeeks = Math.floor((days + 14) / 7);
  const saDays = (days + 14) % 7;
  const sgWeeks = Math.floor(days / 7);
  const sgDays = days % 7;
  return { saWeeks, saDays, sgWeeks, sgDays, totalDays: days };
}

function getBabyInfo(saWeeks) {
  const weeks = Object.keys(WEEKLY_BABY).map(Number).sort((a, b) => a - b);
  let best = weeks[0];
  for (const w of weeks) { if (w <= saWeeks) best = w; else break; }
  return WEEKLY_BABY[best];
}

function createSoundEngine() {
  let ctx = null;
  const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if (ctx.state === "suspended") ctx.resume(); return ctx; };
  const playChime = (freq = 528, type = "sine", dur = 0.6) => {
    try {
      const c = getCtx(), osc = c.createOscillator(), gain = c.createGain(), filt = c.createBiquadFilter();
      filt.type = "lowpass"; filt.frequency.value = 2000; osc.type = type; osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(0, c.currentTime); gain.gain.linearRampToValueAtTime(0.15, c.currentTime + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.connect(filt); filt.connect(gain); gain.connect(c.destination); osc.start(c.currentTime); osc.stop(c.currentTime + dur);
    } catch {}
  };
  return {
    inspire: () => { playChime(396, "sine", 0.8); setTimeout(() => playChime(528, "sine", 0.5), 120); },
    expire: () => { playChime(528, "sine", 0.8); setTimeout(() => playChime(396, "sine", 0.5), 120); },
    hold: () => { playChime(440, "triangle", 0.4); },
    complete: () => { playChime(396, "sine", 0.5); setTimeout(() => playChime(528, "sine", 0.5), 200); setTimeout(() => playChime(639, "sine", 0.8), 400); },
  };
}

// ─── BREATHING PLAYER ───────────────────────────────────────────────────────
function BreathingPlayer({ exercise, onClose }) {
  const [isPlaying, setIsPlaying] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [stepIndex, setStepIndex] = useState(0);
  const [stepElapsed, setStepElapsed] = useState(0);
  const [soundEnabled, setSoundEnabled] = useState(true);
  const intervalRef = useRef(null);
  const soundRef = useRef(null);
  const prevActionRef = useRef("");
  if (!soundRef.current) soundRef.current = createSoundEngine();
  const currentStep = exercise.steps[stepIndex];
  useEffect(() => {
    if (!isPlaying || !soundEnabled) return;
    const act = currentStep.action;
    if (act !== prevActionRef.current || stepElapsed === 0) {
      if (act === "Inspire") soundRef.current.inspire(); else if (act === "Expire") soundRef.current.expire(); else soundRef.current.hold();
      prevActionRef.current = act;
    }
  }, [stepIndex, stepElapsed, isPlaying, soundEnabled, currentStep]);
  useEffect(() => {
    if (!isPlaying) { clearInterval(intervalRef.current); return; }
    intervalRef.current = setInterval(() => {
      setElapsed(e => { if (e + 1 >= exercise.duration) { setIsPlaying(false); if (soundEnabled && soundRef.current) soundRef.current.complete(); return exercise.duration; } return e + 1; });
      setStepElapsed(se => { if (se + 1 >= exercise.steps[stepIndex].duration) { setStepIndex(si => (si + 1) % exercise.steps.length); return 0; } return se + 1; });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [isPlaying, stepIndex, exercise, soundEnabled]);
  const reset = () => { setIsPlaying(false); setElapsed(0); setStepIndex(0); setStepElapsed(0); clearInterval(intervalRef.current); };
  const remaining = exercise.duration - elapsed, mins = Math.floor(remaining / 60), secs = remaining % 60;
  const stepProgress = stepElapsed / currentStep.duration;
  const isInhale = currentStep.action === "Inspire", isHold = currentStep.action === "Retiens";
  const bubbleScale = isInhale ? 0.6 + 0.4 * stepProgress : isHold ? 1 : 1 - 0.4 * stepProgress;
  const actionColor = isInhale ? "#a8d8ea" : isHold ? "#d4a0c0" : "#c8b8d8";
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "linear-gradient(145deg, #faf5f8 0%, #f0e4ed 50%, #e8d5e0 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <button onClick={onClose} style={{ position: "absolute", top: 16, right: 16, background: "none", border: "none", fontSize: 28, color: "#a88b9c", cursor: "pointer", padding: 8 }}>✕</button>
      <button onClick={() => setSoundEnabled(!soundEnabled)} style={{ position: "absolute", top: 16, left: 16, background: "rgba(183,130,163,0.1)", border: "1px solid rgba(183,130,163,0.2)", borderRadius: 12, padding: "6px 12px", fontSize: 14, color: "#7a5a6e", cursor: "pointer" }}>{soundEnabled ? "🔔" : "🔇"}</button>
      <div style={{ fontSize: 14, color: "#a88b9c", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>{exercise.icon} {exercise.name}</div>
      <div style={{ width: 200, height: 200, borderRadius: "50%", margin: "32px 0", background: `radial-gradient(circle, ${actionColor}44 0%, ${actionColor}22 100%)`, border: `2px solid ${actionColor}66`, display: "flex", alignItems: "center", justifyContent: "center", transform: `scale(${bubbleScale})`, transition: "transform 1s ease-in-out, background 0.5s ease" }}>
        <div style={{ textAlign: "center" }}><div style={{ fontSize: 28, fontWeight: 700, color: "#7a5a6e" }}>{currentStep.action}</div><div style={{ fontSize: 40, fontWeight: 300, color: "#b782a3", marginTop: 4 }}>{currentStep.duration - stepElapsed}</div></div>
      </div>
      <div style={{ fontSize: 18, color: "#7a5a6e", fontWeight: 600, marginBottom: 32 }}>{mins}:{secs.toString().padStart(2, "0")}</div>
      <div style={{ display: "flex", gap: 16 }}>
        <button onClick={() => { if (!isPlaying && elapsed === 0 && soundEnabled) soundRef.current?.inspire(); setIsPlaying(!isPlaying); }} style={{ background: isPlaying ? "rgba(183,130,163,0.15)" : "linear-gradient(135deg, #d4a0c0, #b782a3)", color: isPlaying ? "#7a5a6e" : "white", border: isPlaying ? "2px solid #d4a0c0" : "none", borderRadius: 50, padding: "14px 40px", fontSize: 16, fontWeight: 600, cursor: "pointer" }}>{isPlaying ? "Pause" : elapsed > 0 ? "Reprendre" : "Commencer"}</button>
        {elapsed > 0 && <button onClick={reset} style={{ background: "rgba(183,130,163,0.1)", color: "#a88b9c", border: "1.5px solid rgba(183,130,163,0.3)", borderRadius: 50, padding: "14px 24px", fontSize: 16, cursor: "pointer" }}>↺</button>}
      </div>
      {elapsed >= exercise.duration && (<div style={{ marginTop: 32, textAlign: "center", padding: "20px 28px", background: "rgba(212,160,192,0.15)", borderRadius: 16 }}><div style={{ fontSize: 24, marginBottom: 8 }}>🎉</div><div style={{ fontSize: 16, color: "#7a5a6e", fontWeight: 600 }}>Bravo !</div><div style={{ fontSize: 14, color: "#a88b9c", marginTop: 4 }}>Séance terminée. Tu as pris soin de toi et de bébé.</div></div>)}
    </div>
  );
}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", padding: "0 12px", gap: 3 }}>
        {cells.map((d, i) => { if (d === null) return <div key={`e${i}`} />; const ds = dateStr(d), evts = eventsForDate(d), isToday = ds === today, isSel = ds === selectedDate; return (
          <button key={i} onClick={() => { setSelectedDate(ds === selectedDate ? null : ds); setEditingId(null); setShowAdd(false); }} style={{ background: isSel ? "linear-gradient(135deg, #d4a0c0, #b782a3)" : isToday ? "rgba(212,160,192,0.15)" : "transparent", color: isSel ? "white" : "#7a5a6e", border: "none", borderRadius: 12, padding: "8px 2px", cursor: "pointer", fontWeight: isToday || isSel ? 700 : 500, fontSize: 14, minHeight: 42, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            {d}{evts.length > 0 && <div style={{ display: "flex", gap: 2, marginTop: 3 }}>{evts.slice(0, 3).map((e, j) => <div key={j} style={{ width: 5, height: 5, borderRadius: "50%", background: isSel ? "rgba(255,255,255,0.8)" : typeColor(e.type) }} />)}</div>}
          </button>); })}
      </div>
      {selectedDate && (
        <div style={{ padding: "16px 16px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#7a5a6e" }}>{new Date(selectedDate + "T12:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" })}</div>
            <button onClick={() => { setShowAdd(true); setEditingId(null); }} style={{ background: "linear-gradient(135deg, #d4a0c0, #b782a3)", color: "white", border: "none", borderRadius: 10, width: 32, height: 32, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          </div>
          {showAdd && (<div style={{ background: "white", borderRadius: 16, padding: 14, marginBottom: 12, border: "2px solid rgba(212,160,192,0.3)" }}>
            <input placeholder="Titre" value={addForm.title} onChange={e => setAddForm({ ...addForm, title: e.target.value })} style={{ ...inpS, marginBottom: 8 }} />
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}><input type="time" value={addForm.time} onChange={e => setAddForm({ ...addForm, time: e.target.value })} style={{ ...inpS, flex: 1 }} /><select value={addForm.type} onChange={e => setAddForm({ ...addForm, type: e.target.value })} style={{ ...inpS, width: "auto" }}><option value="rdv">📋 RDV</option><option value="task">✅ Tâche</option><option value="milestone">⭐ Étape</option></select></div>
            <input placeholder="Note (optionnel)" value={addForm.note} onChange={e => setAddForm({ ...addForm, note: e.target.value })} style={{ ...inpS, marginBottom: 10 }} />
            <div style={{ display: "flex", gap: 8 }}><button onClick={() => setShowAdd(false)} style={{ flex: 1, padding: 10, borderRadius: 10, border: "1.5px solid #e8d5e0", background: "white", color: "#a88b9c", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Annuler</button><button onClick={addEvent} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: "linear-gradient(135deg, #d4a0c0, #b782a3)", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Ajouter</button></div>
          </div>)}
          {selectedEvents.length === 0 && !showAdd && <div style={{ textAlign: "center", padding: "20px 0", color: "#c4adb8", fontSize: 14 }}>Rien de prévu. Appuie + pour ajouter.</div>}
          {selectedEvents.map(ev => editingId === ev.id ? (
            <div key={ev.id} style={{ background: "white", borderRadius: 14, padding: 14, marginBottom: 10, border: "2px solid rgba(183,130,163,0.3)", boxShadow: "0 2px 16px rgba(183,130,163,0.1)" }}>
              <input value={editForm.title} onChange={e => setEditForm({ ...editForm, title: e.target.value })} style={{ ...inpS, marginBottom: 8, fontWeight: 600 }} />
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}><input type="date" value={editForm.date} onChange={e => setEditForm({ ...editForm, date: e.target.value })} style={{ ...inpS, flex: 1 }} /><input type="time" value={editForm.time} onChange={e => setEditForm({ ...editForm, time: e.target.value })} style={{ ...inpS, flex: 1 }} /></div>
              <input placeholder="Note" value={editForm.note} onChange={e => setEditForm({ ...editForm, note: e.target.value })} style={{ ...inpS, marginBottom: 10 }} />
              <div style={{ display: "flex", gap: 8 }}><button onClick={() => removeEvent(ev.id)} style={{ padding: "8px 14px", borderRadius: 10, border: "1.5px solid #e5393533", background: "rgba(229,57,53,0.06)", color: "#e53935", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Supprimer</button><div style={{ flex: 1 }} /><button onClick={() => setEditingId(null)} style={{ padding: "8px 14px", borderRadius: 10, border: "1.5px solid #e8d5e0", background: "white", color: "#a88b9c", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Annuler</button><button onClick={saveEdit} style={{ padding: "8px 14px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #d4a0c0, #b782a3)", color: "white", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>OK</button></div>
            </div>
          ) : (
            <div key={ev.id} onClick={() => startEdit(ev)} style={{ background: "white", borderRadius: 14, padding: "14px 16px", marginBottom: 10, borderLeft: `4px solid ${typeColor(ev.type)}`, boxShadow: "0 1px 8px rgba(183,130,163,0.06)", display: "flex", gap: 12, alignItems: "center", opacity: ev.done ? 0.55 : 1, cursor: "pointer" }}>
              {ev.type === "task" && <button onClick={e => { e.stopPropagation(); toggleDone(ev.id); }} style={{ width: 24, height: 24, borderRadius: 7, flexShrink: 0, cursor: "pointer", border: ev.done ? "none" : "2px solid #8ec8e0", background: ev.done ? "#8ec8e0" : "white", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>{ev.done ? "✓" : ""}</button>}
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 14, fontWeight: 600, color: "#7a5a6e", textDecoration: ev.done ? "line-through" : "none" }}>{ev.title}</div>{ev.time && <div style={{ fontSize: 12, color: "#a88b9c", marginTop: 2 }}>🕐 {ev.time}</div>}{ev.note && <div style={{ fontSize: 12, color: "#b782a3", marginTop: 2, fontStyle: "italic" }}>{ev.note}</div>}</div>
              <span style={{ color: "#d4a0c0", fontSize: 14, flexShrink: 0 }}>✏️</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [events, setEvents] = useState(() => loadData("bebe-events-v3", generateDefaultEvents()));
  const [breathingExercise, setBreathingExercise] = useState(null);
  const [quoteIndex, setQuoteIndex] = useState(() => getWeeksPregnancy().totalDays % DAILY_QUOTES.length);
  useEffect(() => saveData("bebe-events-v3", events), [events]);
  const { saWeeks, saDays, sgWeeks, sgDays } = getWeeksPregnancy();
  const quote = DAILY_QUOTES[quoteIndex];
  const shuffleQuote = () => { let n; do { n = Math.floor(Math.random() * DAILY_QUOTES.length); } while (n === quoteIndex && DAILY_QUOTES.length > 1); setQuoteIndex(n); };
  const babyInfo = getBabyInfo(saWeeks);
  const today = new Date().toISOString().split("T")[0];
  const nextEvent = events.find(e => e.date >= today && !e.done);

  const card = { background: "white", borderRadius: 20, padding: "18px 20px", boxShadow: "0 2px 16px rgba(183,130,163,0.08)", margin: "0 16px 14px", border: "1px solid rgba(212,160,192,0.12)" };
  const nb = p => ({ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, color: page === p ? "#b782a3" : "#c4adb8", fontSize: 20, padding: "4px 14px" });
  const nl = p => ({ fontSize: 10, fontWeight: page === p ? 700 : 500, color: page === p ? "#b782a3" : "#c4adb8" });

  const renderHome = () => (
    <>
      <div style={{ padding: "24px 16px 0" }}>
        <div style={{ textAlign: "center", fontSize: 12, color: "#b782a3", fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 14 }}>Mon suivi de grossesse</div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 8 }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}><ProgressRing weeks={saWeeks} /><div style={{ fontSize: 14, fontWeight: 700, color: "#7a5a6e", marginTop: 6 }}>{saWeeks} SA + {saDays}j</div><div style={{ fontSize: 12, color: "#a88b9c" }}>({sgWeeks} SG + {sgDays}j)</div></div>
          <BirdAndMouse />
        </div>
      </div>
      <div style={{ ...card, background: "linear-gradient(135deg, rgba(212,160,192,0.1) 0%, rgba(240,228,237,0.4) 100%)", textAlign: "center", position: "relative" }}>
        <button onClick={shuffleQuote} style={{ position: "absolute", top: 12, right: 14, background: "rgba(183,130,163,0.12)", border: "none", borderRadius: 8, width: 28, height: 28, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#b782a3" }} title="Autre message">🔄</button>
        <div style={{ fontSize: 11, color: "#b782a3", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>💌 Mot du jour</div>
        <div style={{ fontSize: 15, color: "#7a5a6e", lineHeight: 1.65, fontStyle: "italic", fontWeight: 500, padding: "0 20px" }}>"{quote}"</div>
      </div>
      <div style={card}><div style={{ display: "flex", gap: 14, alignItems: "center" }}><div style={{ fontSize: 34, flexShrink: 0 }}>{babyInfo.emoji}</div><div><div style={{ fontSize: 14, fontWeight: 700, color: "#7a5a6e" }}>Bébé cette semaine — {babyInfo.fruit}</div><div style={{ fontSize: 13, color: "#b782a3", fontWeight: 600, marginTop: 2 }}>~{babyInfo.size}</div><div style={{ fontSize: 13, color: "#7a5a6e", marginTop: 4, lineHeight: 1.5 }}>{babyInfo.dev}</div></div></div></div>
      <div style={{ ...card, display: "flex", alignItems: "center", gap: 14 }}><div style={{ width: 44, height: 44, borderRadius: 13, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #f3e8f0, #e8d5e0)", fontSize: 20, flexShrink: 0 }}>🍼</div><div><div style={{ fontSize: 12, color: "#a88b9c", fontWeight: 600 }}>Arrivée prévue de bébé</div><div style={{ fontSize: 15, fontWeight: 700, color: "#7a5a6e" }}>Fin septembre – début octobre 2026</div></div></div>
      {nextEvent && (<div style={{ ...card, display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }} onClick={() => setPage("calendar")}><div style={{ width: 44, height: 44, borderRadius: 13, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #e8d5f0, #d5c0e0)", fontSize: 20, flexShrink: 0 }}>📅</div><div style={{ flex: 1 }}><div style={{ fontSize: 12, color: "#a88b9c", fontWeight: 600 }}>Prochainement</div><div style={{ fontSize: 14, fontWeight: 700, color: "#7a5a6e" }}>{nextEvent.title}</div><div style={{ fontSize: 13, color: "#a88b9c" }}>{new Date(nextEvent.date + "T12:00").toLocaleDateString("fr-FR", { day: "numeric", month: "long" })}{nextEvent.time ? ` à ${nextEvent.time}` : ""}</div></div><span style={{ color: "#d4a0c0", fontSize: 18 }}>›</span></div>)}
      <div style={{ margin: "0 16px 14px" }}><FoodSearch compact /></div>
    </>
  );

  const renderBreathing = () => (
    <>
      <div style={{ padding: "28px 20px 16px" }}><div style={{ fontSize: 22, fontWeight: 700, color: "#7a5a6e" }}>Respiration</div><div style={{ fontSize: 14, color: "#a88b9c", marginTop: 4 }}>Prends un moment pour toi 🧘</div></div>
      {BREATHING_EXERCISES.map(ex => (<div key={ex.id} style={{ ...card, cursor: "pointer" }} onClick={() => setBreathingExercise(ex)}><div style={{ display: "flex", gap: 14, alignItems: "center" }}><div style={{ width: 50, height: 50, borderRadius: 15, background: "linear-gradient(135deg, #f3e8f0, #e8d5e0)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>{ex.icon}</div><div style={{ flex: 1 }}><div style={{ fontSize: 15, fontWeight: 700, color: "#7a5a6e" }}>{ex.name}</div><div style={{ fontSize: 13, color: "#a88b9c", marginTop: 3, lineHeight: 1.4 }}>{ex.description}</div><div style={{ fontSize: 12, color: "#b782a3", marginTop: 4, fontWeight: 600 }}>{Math.floor(ex.duration / 60)} min · 🔔 Sons doux</div></div><span style={{ color: "#d4a0c0", fontSize: 20 }}>›</span></div></div>))}
      <div style={{ ...card, opacity: 0.7, textAlign: "center" }}><div style={{ fontSize: 28, marginBottom: 8 }}>🎧</div><div style={{ fontSize: 14, fontWeight: 600, color: "#7a5a6e" }}>Tes enregistrements perso</div><div style={{ fontSize: 13, color: "#a88b9c", marginTop: 4 }}>Bientôt — tes méditations audio apparaîtront ici.</div></div>
    </>
  );

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: "linear-gradient(170deg, #fefbfd 0%, #faf5f8 30%, #f5eef3 100%)", fontFamily: "'Nunito', 'Segoe UI', sans-serif", paddingBottom: 90, position: "relative" }}>
      {breathingExercise && <BreathingPlayer exercise={breathingExercise} onClose={() => setBreathingExercise(null)} />}
      {page === "home" && renderHome()}
      {page === "breathe" && renderBreathing()}
      {page === "calendar" && <CalendarView events={events} setEvents={setEvents} />}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,0.92)", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(212,160,192,0.15)", display: "flex", justifyContent: "space-around", padding: "8px 0 16px", maxWidth: 480, margin: "0 auto", zIndex: 100 }}>
        <button style={nb("home")} onClick={() => setPage("home")}><span>🏠</span><span style={nl("home")}>Accueil</span></button>
        <button style={nb("breathe")} onClick={() => setPage("breathe")}><span>🧘</span><span style={nl("breathe")}>Respirer</span></button>
        <button style={nb("calendar")} onClick={() => setPage("calendar")}><span>📅</span><span style={nl("calendar")}>Calendrier</span></button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
